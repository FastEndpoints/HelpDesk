services:
  mongodb:
    image: docker.io/library/mongo:7.0.30
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?Set MONGO_ROOT_USERNAME in .env (copy .env.example)}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env (copy .env.example)}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        cp /run/config/mongodb-keyfile /tmp/mongodb-keyfile
        chown mongodb:mongodb /tmp/mongodb-keyfile
        chmod 400 /tmp/mongodb-keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --auth --keyFile /tmp/mongodb-keyfile
    ports:
      - 127.0.0.1:${MONGO_PORT:-27017}:27017
    volumes:
      - mongodb-data:/data/db
      - ./.local/mongodb-keyfile:/run/config/mongodb-keyfile:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host localhost --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  mongodb-init:
    image: docker.io/library/mongo:7.0.30
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?Set MONGO_ROOT_USERNAME in .env (copy .env.example)}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env (copy .env.example)}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        mongosh --quiet --host mongodb \
          --username "$${MONGO_INITDB_ROOT_USERNAME}" \
          --password "$${MONGO_INITDB_ROOT_PASSWORD}" \
          --authenticationDatabase admin --eval '
            try {
              rs.status();
              print("Replica set already initialized");
            } catch (error) {
              if (error.codeName !== "NotYetInitialized") throw error;
              rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "localhost:27017" }] });
              print("Replica set initialized");
            }
          '

volumes:
  mongodb-data:
